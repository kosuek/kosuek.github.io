<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>行き帰り</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 <style>
  /* セルに対して直接色を指定してBootstrapのオーバーライドを防ぐ */
  .past td {
    background-color: #e0e0e0 !important;
    color: #888;
  }
  .next td {
    background-color: #0d6efd !important;
    color: white !important;
  }
  .next {
    font-weight: bold;
    border: 2px solid #0d6efd; /* 強調をさらに明確化 */
  }
 </style>
</head>
<body>
  <div class="container py-4">
    <h1 id="clk" class="text-center mb-4"></h1>
    <div class="table-responsive">
      <table class="table table-bordered table-striped text-center align-middle">
        <thead class="table-dark">
          <tr>
            <th>No</th>
            <th>JR勝田発</th>
            <th>JR大甕着</th>
          </tr>
        </thead>
        <tbody id="kaeri">
          <tr><td>01</td><td>17:19</td><td>17:33</td></tr>
          <tr><td>02</td><td>17:42</td><td>17:57</td></tr>
          <tr><td>03</td><td>18:02</td><td>18:17</td></tr>
          <tr><td>04</td><td>18:21</td><td>18:35</td></tr>
          <tr><td>05</td><td>18:47</td><td>19:02</td></tr>
          <tr><td>06</td><td>19:04</td><td>19:19</td></tr>
          <tr><td>07</td><td>19:31</td><td>19:46</td></tr>
          <tr><td>08</td><td>20:21</td><td>20:36</td></tr>
          <tr><td>09</td><td>20:56</td><td>21:10</td></tr>
          <tr><td>10</td><td>21:34</td><td>21:48</td></tr>
          <tr><td>11</td><td>22:41</td><td>22:55</td></tr>
          <tr><td>12</td><td>23:44</td><td>23:58</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // 猶予0：出発時刻になった瞬間に切り替わる閾値
    const timeThresholds = [
      17.317, // 17:19
      17.7,   // 17:42
      18.033, // 18:02
      18.35,  // 18:21
      18.783, // 18:47
      19.067, // 19:04
      19.517, // 19:31
      20.35,  // 20:21
      20.933, // 20:56
      21.567, // 21:34
      22.683, // 22:41
      23.733  // 23:44
    ];

    const subjects = ["おつかれさん(^з^)-☆", "おつかれさんo(ﾟ▽ﾟ)/", "おつかれさん（´3｀）~♪"];
    const email = "mybaptismday991114@gmail.com";

    function updateClock() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();
      const d = now.toLocaleDateString('ja-JP', { weekday: 'short', year: 'numeric', month: '2-digit', day: '2-digit' });
      const t = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      document.getElementById('clk').textContent = `${d} ${t}`;

      // 秒単位まで考慮して判定精度を向上
      const nowTime = h + m / 60 + s / 3600;
      const rows = document.querySelectorAll('#kaeri tr');

      rows.forEach(row => row.classList.remove('past', 'next'));

      let nextIndex = timeThresholds.findIndex(threshold => nowTime < threshold);
      
      if (nextIndex === -1) {
        // 全列車が過去の場合
        rows.forEach(row => row.classList.add('past'));
      } else {
        rows.forEach((row, index) => {
          if (index < nextIndex) {
            row.classList.add('past');
          } else if (index === nextIndex) {
            row.classList.add('next');
          }
        });
      }

      setTimeout(updateClock, 1000); // 秒表示に合わせて1秒更新に変更
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateClock();

      document.querySelectorAll('#kaeri tr').forEach(row => {
        row.addEventListener('click', () => {
          const tds = row.querySelectorAll('td');
          const msg = `勝田発${tds[1].textContent} -> 大甕着${tds[2].textContent}で帰るよ～。`;
          const rand = Math.floor(Math.random() * subjects.length);
          window.location.href = `mailto:${email}?subject=${encodeURIComponent(subjects[rand])}&body=${encodeURIComponent(msg)}`;
        });
      });
    });
  </script>
</body>
</html>
